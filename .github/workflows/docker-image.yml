name: docker-image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 计算镜像元信息
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"

          normalize_ref() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._/-]#-#g; s#/#-#g'
          }

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            primary_tag="${GITHUB_REF_NAME}"
            release_version="${GITHUB_REF_NAME#v}"
            all_tags="${repo}:${primary_tag}"

            if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              all_tags="${all_tags}"$'\n'"${repo}:latest"
            fi
          else
            branch_name="$(normalize_ref "${GITHUB_REF_NAME}")"
            primary_tag="${branch_name}-${short_sha}"
            release_version="${branch_name}"
            all_tags="${repo}:${primary_tag}"$'\n'"${repo}:${branch_name}"
          fi

          {
            echo "repository=${repo}"
            echo "primary_tag=${primary_tag}"
            echo "release_version=${release_version}"
            echo "git_sha=${short_sha}"
            echo "image_ref=${repo}:${primary_tag}"
            echo 'tags<<EOF'
            printf '%s\n' "${all_tags}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.primary_tag }}
          build-args: |
            APP_RELEASE_VERSION=${{ steps.meta.outputs.release_version }}
            APP_GIT_SHA=${{ steps.meta.outputs.git_sha }}
            APP_IMAGE_TAG=${{ steps.meta.outputs.image_ref }}
